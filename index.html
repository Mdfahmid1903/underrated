<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underrated</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="navbar">
            <div class="logobox">
                <a href="#">
                    <div class="logo"></div>
                </a>
            </div>

            <div class="a" id="navlinks">
                <div class="box1 box"><a href="#">T-shirts</a></div>
                <div class="box2 box"><a href="#">Jeans</a></div>
                <div class="box3 box"><a href="#">New arrivals</a></div>
                <div class="box4 box"><a href="#">Contacts</a></div>
            </div>

            <div class="searchbox">
                <input type="text" placeholder="Search...">
                <button class="search"><i class="fas fa-search"></i></button>
            </div>

            <div class="icons">
                <div class="location"><a href="#">
                        <div><i class="fa-solid fa-location-dot"></i><br>stores</div>
                    </a></div>
                <div class="profile"><a href="#">
                        <div><i class="fa-solid fa-circle-user"></i><br>Profile</div>
                    </a></div>
                <div class="wishlist"><a href="#">
                        <div><i class="fa-solid fa-heart"></i><br>Wishlist</div>
                    </a></div>
                <div class="cart"><a href="#">
                        <div><i class="fa-solid fa-shopping-cart"></i><br>Cart</div>
                    </a></div>
            </div>

            <button class="hamburger" id="hamburger">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <div class="mobile-menu hide" id="mobilemenu">
            <button class="close-btn" id="closebtn">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="mobile-search">
                <input type="text" placeholder="Search...">
                <button class="search"><i class="fas fa-search"></i></button>
            </div>
            <a href="#">T-shirts</a>
            <a href="#">Jeans</a>
            <a href="#">New arrivals</a>
            <a href="#">Contacts</a>
        </div>

        <div class="overlay hide" id="overlay"></div>
    </header>

    <div class="body">
        <a href="#">
            <div class="shopnow">Shop now</div>
        </a>
    </div>

    <div class="products">
        <div class="selection">
            <div class="product1 shop">
                <h2>Drop shoulders</h2>
                <img src="/tshirts.avif" alt="Drop shoulders">
                <a href="#" class="buynow">Buy now</a>
            </div>
            <div class="product2 shop">
                <h2>T-shirts</h2>
                <img src="/underrated tshirts.png" alt="T-shirts">
                <a href="#" class="buynow">Buy now</a>
            </div>
            <div class="product3 shop">
                <h2>Jeans</h2>
                <img src="/Jeans.avif" alt="Jeans">
                <a href="#" class="buynow">Buy now</a>
            </div>
        </div>
    </div>

    <div class="body2">
        <div class="secondbody"></div>
    </div>

    <footer>
        <div>
            <p>made with <i class="fa-solid fa-heart"></i> by Md. Fahmid.</p>
            <p>&copy; 2026 Underrated. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
